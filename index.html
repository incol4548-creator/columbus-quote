<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>콜럼버스 견적서 발송</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --acc:#6b4f2a;--acl:#f7ede0;--ach:#4a3318;--acb:#d4b896;
  --pur:#5028a0;--purl:#f0ecfc;--purb:#c0a8e8;
  --grn:#2d7a38;--gbg:#edf7ef;--gbd:#aed4b8;
  --red:#b03028;--rbg:#fdf0f0;--rbd:#e8aaaa;
  --blu:#1e4f96;--bbg:#edf2fb;--bbd:#a8c0e8;
  --bg:#f4f1eb;--card:#fff;--border:#ddd8cc;--muted:#7a7060;
  --r:10px;--rs:7px;
}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',-apple-system,sans-serif;background:var(--bg);color:#2a2215;min-height:100vh;padding-bottom:40px}
.hdr{background:var(--acc);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:11px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr-ico{font-size:22px}
.hdr h1{font-size:16px;font-weight:600;letter-spacing:-.3px}
.hdr p{font-size:11px;opacity:.72;margin-top:1px}
.wrap{max-width:600px;margin:0 auto;padding:18px 14px 0}
.sec{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.sec-hd{padding:12px 16px;background:#f5f1ea;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#3d2e18}
.sec-hd .n{width:20px;height:20px;background:var(--acc);color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-bd{padding:16px;display:flex;flex-direction:column;gap:12px}
.f{display:flex;flex-direction:column;gap:5px}
.f label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
input[type=text],input[type=email],input[type=date],input[type=number],textarea{
  width:100%;border:1px solid var(--border);border-radius:var(--rs);
  padding:9px 12px;font-size:15px;font-family:inherit;color:#2a2215;
  background:var(--card);outline:none;appearance:none;-webkit-appearance:none;
  transition:border-color .15s,box-shadow .15s}
input:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(107,79,42,.1)}
textarea{resize:vertical;line-height:1.65;min-height:130px}
.amt{background:var(--acl);border:1px solid var(--acb);border-radius:var(--rs);padding:11px 13px}
.amt .al{font-size:10px;font-weight:600;color:var(--acc);margin-bottom:3px}
.amt .av{font-size:20px;font-weight:600;color:var(--acc)}

/* 첨부 체크 */
.ach-list{display:flex;flex-direction:column;gap:8px}
.ach{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;user-select:none;transition:all .12s}
.ach:hover{background:var(--acl);border-color:var(--acb)}
.ach.on{background:var(--acl);border-color:var(--acc)}
.ach input[type=checkbox]{width:17px;height:17px;accent-color:var(--acc);flex-shrink:0}
.ach .aico{font-size:18px;flex-shrink:0}
.ach .an{font-size:13px;font-weight:600}
.ach .ad{font-size:11px;color:var(--muted);margin-top:2px}

/* 제안서 */
.divider{height:1px;background:var(--border);margin:4px 0}
.prop-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px}
.ftabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.ft{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .12s;user-select:none}
.ft.on{background:var(--pur);border-color:var(--pur);color:#fff}
.plist{display:flex;flex-direction:column;gap:6px}
.pc{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;transition:all .12s;user-select:none}
.pc:hover{background:var(--purl);border-color:var(--purb)}
.pc.sel{border-color:var(--pur);background:var(--purl)}
.pc input[type=radio]{width:15px;height:15px;flex-shrink:0;margin-top:2px;accent-color:var(--pur)}
.pc .pt{font-size:12px;font-weight:600;line-height:1.4}
.pbg{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:8px;margin-top:3px}
.pb-b{background:#ddeeff;color:#1a4080;border:1px solid #aaccee}
.pb-c{background:#fff0d0;color:#804400;border:1px solid #f0c880}
.no-prop{font-size:12px;color:var(--muted);padding:8px 0;text-align:center}

/* 첨부 미리보기 */
.atch-preview{background:#f9f7f3;border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px}
.atch-preview .title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px}
.atch-items{display:flex;flex-direction:column;gap:5px}
.atch-item{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#2a2215}
.atch-item .dot{width:6px;height:6px;background:var(--acc);border-radius:50%;flex-shrink:0}
.atch-empty{font-size:12px;color:var(--muted)}

/* 버튼 */
.btn-row{display:flex;flex-direction:column;gap:10px}
.btn{width:100%;padding:13px;border-radius:var(--rs);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;letter-spacing:-.3px}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-dl{background:var(--card);border:1.5px solid var(--acc);color:var(--acc)}
.btn-dl:hover:not(:disabled){background:var(--acl)}
.btn-go{background:var(--acc);color:#fff}
.btn-go:hover:not(:disabled){background:var(--ach)}

/* 상태 */
.st{border-radius:var(--rs);padding:12px 14px;font-size:13px;font-weight:600;display:none;align-items:center;gap:9px;line-height:1.5}
.st.show{display:flex}
.st.ok{background:var(--gbg);color:var(--grn);border:1px solid var(--gbd)}
.st.err{background:var(--rbg);color:var(--red);border:1px solid var(--rbd)}
.st.ing{background:var(--bbg);color:var(--blu);border:1px solid var(--bbd)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:15px;height:15px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

/* 설정 */
.cfg-saved{display:inline-flex;align-items:center;gap:5px;background:var(--gbg);color:var(--grn);border:1px solid var(--gbd);border-radius:20px;font-size:11px;font-weight:600;padding:2px 10px;margin-left:8px}

@media(max-width:480px){.r2{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-ico">🎭</div>
  <div>
    <h1>어린이 인형극단 콜럼버스</h1>
    <p>견적서 발송 시스템</p>
  </div>
</div>

<div class="wrap">

<!-- ① 견적 정보 -->
<div class="sec">
  <div class="sec-hd"><span class="n">1</span>견적 정보</div>
  <div class="sec-bd">
    <div class="f"><label>기관명</label><input type="text" id="inst" autocomplete="off"></div>
    <div class="r2">
      <div class="f"><label>견적일자</label><input type="date" id="qdate"></div>
      <div class="f"><label>수신 이메일</label><input type="email" id="recip"></div>
    </div>
    <div class="f"><label>공연 제목</label><input type="text" id="show"></div>
    <div class="r2">
      <div class="f"><label>공연 횟수</label><input type="number" id="qty" value="1" min="1"></div>
      <div class="f"><label>단가 (원)</label><input type="number" id="unit" value="0" step="10000" min="0"></div>
    </div>
    <div class="amt">
      <div class="al">합계 금액</div>
      <div class="av" id="totAmt">₩ 0</div>
    </div>
  </div>
</div>

<!-- ② 이메일 내용 -->
<div class="sec">
  <div class="sec-hd"><span class="n">2</span>이메일 내용</div>
  <div class="sec-bd">
    <div class="f"><label>이메일 제목</label><input type="text" id="esub"></div>
    <div class="f">
      <label>이메일 본문</label>
      <textarea id="ebody"></textarea>
      <div style="font-size:11px;color:var(--muted);margin-top:4px">※ 발신자 서명(연락처)은 자동으로 추가됩니다.</div>
    </div>
  </div>
</div>

<!-- ③ 첨부파일 -->
<div class="sec">
  <div class="sec-hd"><span class="n">3</span>첨부파일 선택</div>
  <div class="sec-bd">
    <div class="ach-list">
      <label class="ach on" id="w-q"><input type="checkbox" id="cb-q" checked><span class="aico">📄</span><span><span class="an">견적서 PDF</span><span class="ad" style="display:block">자동 생성되는 견적서</span></span></label>
      <label class="ach on" id="w-bk"><input type="checkbox" id="cb-bk" checked><span class="aico">🏦</span><span><span class="an">통장사본</span><span class="ad" style="display:block">bank-account.jpg</span></span></label>
      <label class="ach on" id="w-bz"><input type="checkbox" id="cb-bz" checked><span class="aico">📑</span><span><span class="an">사업자등록증</span><span class="ad" style="display:block">business-registration.jpg</span></span></label>
    </div>

    <div class="divider"></div>

    <div>
      <div class="prop-label">🎪 공연 제안서</div>
      <div class="ftabs">
        <div class="ft on" onclick="filt('all',this)">전체</div>
        <div class="ft" onclick="filt('b',this)">B타입 — 소·중형</div>
        <div class="ft" onclick="filt('c',this)">C타입 — 대형·원거리</div>
      </div>
      <div class="plist" id="plist"></div>
    </div>

    <div class="divider"></div>

    <!-- 첨부 미리보기 -->
    <div class="atch-preview">
      <div class="title">📎 발송 시 첨부되는 파일</div>
      <div class="atch-items" id="atchPreview"></div>
    </div>
  </div>
</div>

<!-- ④ 발송 -->
<div class="sec">
  <div class="sec-hd"><span class="n">4</span>발송</div>
  <div class="sec-bd">
    <div class="btn-row">
      <button class="btn btn-dl" id="btnDl" onclick="dlPDF()">📥 견적서 PDF 다운로드</button>
      <button class="btn btn-go" id="btnSend" onclick="doSend()">📨 이메일 발송</button>
    </div>
    <div class="st" id="stBox"><div class="spin" id="sp" style="display:none"></div><span id="stTxt"></span></div>
  </div>
</div>

<!-- ⑤ EmailJS 설정 -->
<div class="sec">
  <div class="sec-hd">
    <span class="n">⚙</span>EmailJS 설정
    <span class="cfg-saved" id="cfgBadge" style="display:none">✅ 저장됨</span>
  </div>
  <div class="sec-bd">
    <div class="f"><label>Public Key</label><input type="text" id="ej-pk"></div>
    <div class="f"><label>Service ID</label><input type="text" id="ej-sid"></div>
    <div class="f"><label>Template ID</label><input type="text" id="ej-tid"></div>
    <button class="btn btn-go" onclick="saveCfg()" style="margin-top:4px">💾 설정 저장</button>
    <div class="st" id="cfgSt"></div>
  </div>
</div>

</div><!-- /wrap -->

<script>
const META={
  '__공연계획서_배려와존중_인형극_양치기소년_시로.pdf':{label:'양치기소년 시로 — 배려와 존중 인성교육',type:'b'},
  '__공연계획서_생활안전인형극-도와줘요_안전킹.pdf':{label:'도와줘요 안전킹 — 생활안전',type:'b'},
  '__공연계획서_장애인식개선_교육인형극_개미와-노래하는-베짱이.pdf':{label:'개미와 노래하는 베짱이 — 장애인식개선',type:'b'},
  '_공연계획서__호랑이님_100번째생일잔치.pdf':{label:'호랑이님 100번째 생일잔치',type:'c'},
  '_공연계획서_다문화인식_및_장애인식개선_인형극_지혜로운반쪽이.pdf':{label:'지혜로운 반쪽이 — 다문화·장애인식개선',type:'c'},
  '_공연계획서_생활안전인형극_도와줘요_안전킹.pdf':{label:'도와줘요 안전킹 — 생활안전 (일반)',type:'c'},
  '_공연계획서_성폭력예방인형극_성폭력예방연구소.pdf':{label:'성폭력 예방연구소',type:'c'},
  '_공연계획서_식중독예방_및_식습관개선_교육_인형극세균이삐뽀__건강생활_고고고.pdf':{label:'세균이 삐뽀 — 식중독예방·식습관개선',type:'c'},
  '_공연계획서_싱겁게먹기_식습관개선_어린이인형극_퐁퐁이의_건강생활대작전.pdf':{label:'퐁퐁이의 건강생활 대작전 — 싱겁게 먹기',type:'c'},
  '_공연계획서_아토피예방_및_식습관개선_인형극-빨간모자는요리사.pdf':{label:'빨간모자는 요리사 — 아토피·식습관개선',type:'c'},
  '_공연계획서_인성_교육_인형극-양치기소년시로.pdf':{label:'양치기소년 시로 — 인성교육 (일반)',type:'c'},
  '_공연계획서_크리스마스인형극_크리스마스의_종소리.pdf':{label:'크리스마스의 종소리',type:'c'},
  '_공연계획서_탄소중립_환경_교육인형극_친환경_지구를_지켜라.pdf':{label:'친환경 지구를 지켜라 — 탄소중립·환경교육',type:'c'},
  '_공연계획서_학교폭력예방_정신건강예방인형극_나_너_우리-모두-소중해.pdf':{label:'나 너 우리 모두 소중해 — 학교폭력·정신건강',type:'c'},
  '_공연계획서성폭력예방_인형극_성폭력예방_우리가알려줘요.pdf':{label:'성폭력 예방 우리가 알려줘요',type:'c'},
};

let selFiles=new Set(), pf='all';

// 초기화
document.getElementById('qdate').value=new Date().toISOString().split('T')[0];
loadCfg();
renderP();
updatePreview();

// 합계 계산
function calc(){
  const q=parseInt(document.getElementById('qty').value)||0;
  const u=parseInt(document.getElementById('unit').value)||0;
  document.getElementById('totAmt').textContent='₩ '+(q*u).toLocaleString('ko-KR');
}
['qty','unit'].forEach(id=>document.getElementById(id).addEventListener('input',calc));

// 첨부 체크박스
[['cb-q','w-q'],['cb-bk','w-bk'],['cb-bz','w-bz']].forEach(([c,w])=>{
  document.getElementById(c).addEventListener('change',function(){
    document.getElementById(w).classList.toggle('on',this.checked);
    updatePreview();
  });
});

// 제안서 필터
function filt(t,el){
  pf=t;
  document.querySelectorAll('.ft').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  renderP();
}

function renderP(){
  const files=Object.keys(META).filter(f=>pf==='all'||META[f].type===pf);
  if(!files.length){
    document.getElementById('plist').innerHTML='<div class="no-prop">해당 타입의 제안서가 없습니다</div>';
    return;
  }
  document.getElementById('plist').innerHTML=files.map(f=>{
    const m=META[f],s=selFiles.has(f);
    const fn=f.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="pc ${s?'sel':''}" onclick="selP('${fn}')">
      <div style="width:17px;height:17px;border-radius:4px;border:2px solid ${s?'#5028a0':'#bbb'};background:${s?'#5028a0':'#fff'};flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s">
        ${s?'<svg width=\"10\" height=\"8\" viewBox=\"0 0 10 8\" fill=\"none\"><path d=\"M1 4l3 3 5-6\" stroke=\"white\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>':''}
      </div>
      <span><span class="pt">${m.label}</span><br>
      <span class="pbg ${m.type==='b'?'pb-b':'pb-c'}">${m.type==='b'?'B타입 — 소·중형':'C타입 — 대형·원거리'}</span></span>
    </div>`;
  }).join('');
}

function selP(f){
  if(selFiles.has(f)) selFiles.delete(f);
  else selFiles.add(f);
  renderP();
  updatePreview();
}

// 첨부 미리보기 업데이트
function updatePreview(){
  const items=[];
  if(document.getElementById('cb-q').checked) items.push({ico:'📄',name:'견적서 PDF'});
  if(document.getElementById('cb-bk').checked) items.push({ico:'🏦',name:'통장사본'});
  if(document.getElementById('cb-bz').checked) items.push({ico:'📑',name:'사업자등록증'});
  selFiles.forEach(f=>items.push({ico:'🎪',name:(META[f]||{}).label||f}));

  const el=document.getElementById('atchPreview');
  if(!items.length){
    el.innerHTML='<div class="atch-empty">선택된 첨부파일이 없습니다</div>';
  }else{
    el.innerHTML=items.map(i=>`<div class="atch-item"><span class="dot"></span>${i.ico} ${i.name}</div>`).join('');
  }
}

// 상태 표시
function showSt(type,msg){
  const b=document.getElementById('stBox');
  b.className='st show '+type;
  document.getElementById('stTxt').textContent=msg;
  document.getElementById('sp').style.display=type==='ing'?'block':'none';
  if(type!=='ing') setTimeout(()=>{b.className='st';},8000);
}
function setL(on){
  document.getElementById('btnDl').disabled=on;
  document.getElementById('btnSend').disabled=on;
}

function getF(){
  return{
    inst:document.getElementById('inst').value.trim(),
    qdate:document.getElementById('qdate').value,
    recip:document.getElementById('recip').value.trim(),
    show:document.getElementById('show').value.trim(),
    qty:parseInt(document.getElementById('qty').value)||1,
    unit:parseInt(document.getElementById('unit').value)||0,
    esub:document.getElementById('esub').value.trim(),
    ebody:document.getElementById('ebody').value.trim(),
  };
}

function validate(d,skipEmail){
  if(!d.inst) return '기관명을 입력해주세요.';
  if(!d.qdate) return '견적일자를 선택해주세요.';
  if(!d.show) return '공연 제목을 입력해주세요.';
  if(!skipEmail&&!d.recip) return '수신 이메일을 입력해주세요.';
  if(!skipEmail&&!d.esub) return '이메일 제목을 입력해주세요.';
  if(!skipEmail&&!d.ebody) return '이메일 본문을 입력해주세요.';
  return null;
}

// 한자 금액
function korW(n){
  if(!n)return'영';
  const u=['','만','억'],d=['','일','이','삼','사','오','육','칠','팔','구'],s=['','십','백','천'];
  let r='',ui=0;
  while(n>0){
    const c=n%10000;
    if(c){let cs='';for(let i=3;i>=0;i--){const x=Math.floor(c/Math.pow(10,i))%10;if(x)cs+=(x===1&&i>0?'':d[x])+s[i];}r=cs+u[ui]+r;}
    n=Math.floor(n/10000);ui++;
  }
  return r;
}

// PDF 생성
async function buildPDF(d){
  const{PDFDocument,rgb,StandardFonts}=PDFLib;
  const doc=await PDFDocument.create();
  const pg=doc.addPage([595,841]);
  const hF=await doc.embedFont(StandardFonts.HelveticaBold);
  const rF=await doc.embedFont(StandardFonts.Helvetica);
  const ML=42,MR=553,PW=MR-ML;
  const BK=rgb(0,0,0),DG=rgb(.35,.35,.35),LG=rgb(.82,.82,.82),BG=rgb(.95,.95,.95);

  function ln(x1,y1,x2,y2,w=.5,c=BK){pg.drawLine({start:{x:x1,y:y1},end:{x:x2,y:y2},thickness:w,color:c});}
  function box(x,y,w,h,fill,stroke,sw=.5){
    if(fill)pg.drawRectangle({x,y,width:w,height:h,color:fill});
    if(stroke)pg.drawRectangle({x,y,width:w,height:h,borderColor:stroke,borderWidth:sw});
  }
  function cell(s,x,y,w,h,font,sz,color,align='center',pad=0){
    let fs=sz;
    while(fs>6&&font.widthOfTextAtSize(s,fs)>w-pad*2-2)fs-=.2;
    const tw=font.widthOfTextAtSize(s,fs);
    const tx=align==='center'?x+(w-tw)/2:align==='right'?x+w-tw-pad:x+pad;
    pg.drawText(s,{x:tx,y:y+(h-fs)/2,size:fs,font,color:color||BK});
  }

  const tot=d.qty*d.unit;
  const[yr,mo,dy]=d.qdate.split('-');
  const tit='견   적   서',tsz=26,tw=hF.widthOfTextAtSize(tit,tsz);
  pg.drawText(tit,{x:(595-tw)/2,y:800,size:tsz,font:hF,color:BK});
  ln(ML,793,MR,793,1.5);ln(ML,790,MR,790,.5);

  const IT=770,IB=620,IH=150,SX=318,SR=30,rW=SX-ML,sW=MR-SX;
  box(ML,IB,PW,IH,null,BK,.8);ln(SX,IB,SX,IT,.8);

  const rY=IT-SR;
  box(ML,rY,rW,SR,BG,null);cell('등록번호',ML,rY,rW*.35,SR,hF,7.5,DG);
  ln(ML+rW*.35,rY,ML+rW*.35,IT,.5);ln(ML,rY,SX,rY,.5);

  const mY=IB+SR,mH=IH-SR*2;
  cell(`${d.inst} 귀하`,ML,mY,rW,mH,hF,13,BK,'left',5,7);
  ln(ML,mY,SX,mY,.5);ln(ML,mY+mH,SX,mY+mH,.5);

  box(ML,IB,rW,SR,BG,null);
  cell('합계금액 (공급가액)',ML,IB,rW*.45,SR,hF,7,DG);
  ln(ML+rW*.45,IB,ML+rW*.45,IB+SR,.5);
  cell(`금 ${korW(tot)}원 정`,ML+rW*.45,IB,rW*.3,SR,rF,7.5,BK,'left',3);
  cell(`( ₩ ${tot.toLocaleString()} 원 정 )`,ML+rW*.75,IB,rW*.25,SR,rF,7,BK,'right',3);

  cell(`날짜: ${parseInt(yr)}년 ${parseInt(mo)}월 ${parseInt(dy)}일`,SX,rY,sW,SR,rF,8,BK,'center');

  const rows=[
    {k:'등록번호',v:'291-74-00359'},
    {k:'상호',v:'인형극단 콜럼버스',sub:{k:'대표자',v:'홍종우'}},
    {k:'사업장소재지',v:'경기도 안산시 단원구 이삭5길2 301호'},
    {k:'업태',v:'서비스',sub:{k:'종목',v:'어린이인형극'}},
    {k:'전화번호',v:'010-5367-4548'},
  ];
  rows.forEach((row,i)=>{
    const ry=IT-SR*(i+1);
    if(i>0)ln(SX,ry+SR,MR,ry+SR,.5);
    if(i===0)box(SX,ry,sW,SR,BG,null);
    const kw=sW*.28;
    if(row.sub){
      const vw=sW*.36;
      cell(row.k,SX,ry,kw,SR,hF,7.5,DG);ln(SX+kw,ry,SX+kw,ry+SR,.5);
      cell(row.v,SX+kw,ry,vw,SR,rF,7.5,BK,'left',3);ln(SX+kw+vw,ry,SX+kw+vw,ry+SR,.5);
      cell(row.sub.k,SX+kw+vw,ry,kw,SR,hF,7.5,DG);ln(SX+kw+vw+kw,ry,SX+kw+vw+kw,ry+SR,.5);
      cell(row.sub.v,SX+kw+vw+kw,ry,vw,SR,rF,7.5,BK,'left',3);
    }else{
      cell(row.k,SX,ry,kw,SR,hF,7.5,DG);ln(SX+kw,ry,SX+kw,ry+SR,.5);
      cell(row.v,SX+kw,ry,sW-kw,SR,rF,7.5,BK,'left',3);
    }
  });

  const TT=IB-2,HDH=24,DTH=22,ROWS=12;
  const COLS=[{l:'번호',w:.055},{l:'품명',w:.28},{l:'규격',w:.07},{l:'수량',w:.07},{l:'단가',w:.13},{l:'공급가액',w:.165},{l:'비고',w:.23}];
  const cw=COLS.reduce((s,c)=>s+c.w,0);let cx=ML;
  COLS.forEach(c=>{c.px=cx;c.pw=PW*(c.w/cw);cx+=c.pw;});
  const hY=TT-HDH;
  box(ML,hY,PW,HDH,BG,null);box(ML,hY,PW,HDH,null,BK,.8);
  COLS.forEach(c=>{cell(c.l,c.px,hY,c.pw,HDH,hF,8,DG);ln(c.px,hY,c.px,hY+HDH,.5);});

  for(let r=0;r<ROWS;r++){
    const ry=hY-DTH*(r+1);
    ln(ML,ry,MR,ry,.3,LG);COLS.forEach(c=>ln(c.px,ry,c.px,ry+DTH,.3,LG));ln(MR,ry,MR,ry+DTH,.3,LG);
    if(r===0){
      cell('1',COLS[0].px,ry,COLS[0].pw,DTH,rF,8,BK);
      cell(d.show,COLS[1].px,ry,COLS[1].pw,DTH,rF,8.5,BK,'left',4,6.5);
      cell('회',COLS[2].px,ry,COLS[2].pw,DTH,rF,8,BK);
      cell(String(d.qty),COLS[3].px,ry,COLS[3].pw,DTH,rF,8,BK,'right',4);
      cell(d.unit.toLocaleString(),COLS[4].px,ry,COLS[4].pw,DTH,rF,8,BK,'right',4);
      cell(tot.toLocaleString(),COLS[5].px,ry,COLS[5].pw,DTH,rF,8,BK,'right',4);
    }
  }
  const tB=hY-DTH*ROWS;box(ML,tB,PW,TT-tB,null,BK,.8);

  const FH=22,sY=tB-FH;
  box(ML,sY,PW,FH,BG,null);box(ML,sY,PW,FH,null,BK,.8);
  cell('합  계',ML,sY,PW*.4,FH,hF,8,DG);ln(ML+PW*.4,sY,ML+PW*.4,sY+FH,.5);
  cell(`${tot.toLocaleString()} 원`,ML+PW*.4,sY,PW*.6,FH,hF,9,BK,'right',6);

  const vY=tB-FH*2;box(ML,vY,PW,FH,null,BK,.8);
  cell('부가세 없음 ( 면세 사업자 )',ML,vY,PW*.4,FH,rF,8,DG,'left',6);
  ln(ML+PW*.4,vY,ML+PW*.4,vY+FH,.5);
  cell('0 원',ML+PW*.4,vY,PW*.6,FH,rF,8,DG,'right',6);
  pg.drawText('※ 위와 같이 견적서를 제출합니다.',{x:ML,y:vY-26,size:8,font:rF,color:DG});

  return await doc.save();
}

async function dlPDF(){
  const d=getF();
  const e=validate(d,true);
  if(e){showSt('err',e);return;}
  setL(true);showSt('ing','PDF 생성 중...');
  try{
    const bytes=await buildPDF(d);
    const blob=new Blob([bytes],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`견적서_${d.inst}.pdf`;a.click();
    URL.revokeObjectURL(url);
    showSt('ok','✅ PDF 다운로드 완료!');
  }catch(e){showSt('err','PDF 실패: '+e.message);}
  finally{setL(false);}
}

async function doSend(){
  const d=getF();
  const e=validate(d,false);
  if(e){showSt('err',e);return;}

  const pk=document.getElementById('ej-pk').value.trim();
  const sid=document.getElementById('ej-sid').value.trim();
  const tid=document.getElementById('ej-tid').value.trim();
  if(!pk||!sid||!tid){showSt('err','아래 EmailJS 설정을 먼저 저장해주세요.');return;}

  const noAttach=!document.getElementById('cb-q').checked&&!document.getElementById('cb-bk').checked&&!document.getElementById('cb-bz').checked&&selFiles.size===0;
  if(noAttach){showSt('err','첨부파일을 최소 1개 이상 선택해주세요.');return;}

  setL(true);showSt('ing','이메일 발송 중...');
  try{
    const tot=(d.qty*d.unit).toLocaleString('ko-KR');
    const[yr,mo,dy]=d.qdate.split('-');
    const sign='\n\n──────────────────────────\n어린이 인형극단 콜럼버스\nTEL: 031-417-4548  /  H/P: 010-5367-4548\nE-mail: hellow4548@naver.com\n──────────────────────────';
    emailjs.init(pk);
    await emailjs.send(sid,tid,{
      to_email:d.recip,
      subject:d.esub,
      body:d.ebody+sign,
      institution:d.inst,
      quote_date:`${parseInt(yr)}년 ${parseInt(mo)}월 ${parseInt(dy)}일`,
      show_title:d.show,
      qty:d.qty+'회',
      unit_price:'₩'+d.unit.toLocaleString(),
      total:'₩'+tot,
      proposal:selFiles.size>0?[...selFiles].map(f=>(META[f]||{}).label||f).join('\n'):'없음',
    });
    showSt('ok',`✅ ${d.recip} 으로 발송 완료!`);
  }catch(err){
    showSt('err','❌ 발송 실패: '+(err.text||err.message||JSON.stringify(err)));
  }finally{setL(false);}
}

function saveCfg(){
  const pk=document.getElementById('ej-pk').value.trim();
  const sid=document.getElementById('ej-sid').value.trim();
  const tid=document.getElementById('ej-tid').value.trim();
  if(!pk||!sid||!tid){
    const s=document.getElementById('cfgSt');
    s.className='st show err';s.textContent='3칸을 모두 입력해주세요.';
    setTimeout(()=>{s.className='st';},3000);return;
  }
  try{
    localStorage.setItem('col_ej',JSON.stringify({pk,sid,tid}));
    document.getElementById('cfgBadge').style.display='';
    const s=document.getElementById('cfgSt');
    s.className='st show ok';s.textContent='✅ 저장 완료!';
    setTimeout(()=>{s.className='st';},3000);
  }catch(e){alert('저장 실패: '+e.message);}
}

function loadCfg(){
  try{
    const c=JSON.parse(localStorage.getItem('col_ej')||'{}');
    if(c.pk){document.getElementById('ej-pk').value=c.pk;document.getElementById('cfgBadge').style.display='';}
    if(c.sid)document.getElementById('ej-sid').value=c.sid;
    if(c.tid)document.getElementById('ej-tid').value=c.tid;
  }catch{}
}
